<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <!-- Existing dependencies — unchanged for DOI review -->
    <link href="//www.nps.gov/lib/bootstrap/3.3.2/css/nps-bootstrap.min.css" rel="stylesheet">
    <link href="//cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.5.5/slick.min.css" rel="stylesheet">
    <link href="//cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.5.5/slick-theme.min.css" rel="stylesheet">
    <link href="assets/css/app.css" rel="stylesheet">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="//www.nps.gov/lib/bootstrap/3.3.2/js/nps-bootstrap.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.5.5/slick.min.js"></script>
    <script src="assets/js/app.min.js"></script>
  </head>
  <body>

    <div id="grid-wrapper">

      <!-- Top row: Park Alerts + Road Conditions -->
      <div class="grid-row" id="row-top">

        <!-- Top-left: NPS Park Alerts (cycles if multiple) -->
        <div class="grid-panel" id="panel-alerts">
          <div class="panel-label">Park Alerts</div>
          <div class="panel-content" id="alerts-content">
            <p class="placeholder-text">Loading alerts&hellip;</p>
          </div>
          <div id="alerts-dots"></div>
        </div>

        <!-- Top-right: Road Conditions Map (iframe, always visible) -->
        <div class="grid-panel" id="panel-map">
          <div class="panel-content" id="map-content">
          <iframe
            id="roads-map"
            title="Yellowstone Road Conditions Map">
          </iframe>
          </div>
        </div>

      </div><!-- /top row -->

      <!-- Bottom row: Current Weather + Visitor Center Information -->
      <div class="grid-row">

        <!-- Bottom-left: Current Weather (NWS API, location-specific) -->
        <div class="grid-panel" id="panel-weather">
          <div class="panel-label" id="weather-label">Current Weather</div>
          <div class="panel-content" id="weather-content">
            <p class="placeholder-text">Loading forecast&hellip;</p>
          </div>
        </div>

        <!-- Bottom-right: Visitor Center Information (YELL Live, cycles if multiple) -->
        <div class="grid-panel" id="panel-messages">
          <div class="panel-label">Visitor Center Information</div>
          <div class="panel-content" id="messages-content">
            <p class="placeholder-text">Loading messages&hellip;</p>
          </div>
          <div id="messages-dots"></div>
        </div>

      </div><!-- /bottom row -->

    </div><!-- /grid-wrapper -->

  </body>
</html>
