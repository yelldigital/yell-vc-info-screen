<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <style>
      /* Base map layout — fills the iframe container */
      body {
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #map {
        height: 100%;
        width: 100%;
      }

      /* Legend opacity override — NPMap.js sets this below 1 by default */
      .leaflet-control-legend {
        opacity: 1 !important;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="assets/js/app.min.js"></script>
  </body>
</html>
